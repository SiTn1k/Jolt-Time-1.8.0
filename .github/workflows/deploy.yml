name: Deploy to Supabase

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: false

      - name: Build
        run: npm run build
        continue-on-error: false

      - name: Deploy Edge Functions
        run: |
          npm install -g supabase
          
          # List of functions to deploy
          FUNCTIONS=(
            "expedition-sync"
            "expedition-rewards"
            "daily-rewards"
            "story-quests"
            "validate-purchase"
          )
          
          for func in "${FUNCTIONS[@]}"; do
            echo "Deploying $func..."
            supabase functions deploy $func --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADSGRAM_SECRET: ${{ secrets.ADSGRAM_SECRET }}
          RETENTION_BOT_USERNAME: ${{ secrets.RETENTION_BOT_USERNAME }}

  # Optional: Deploy frontend to Vercel/Netlify
