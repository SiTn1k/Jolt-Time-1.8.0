name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, fix/**]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: TypeScript check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, unit-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENV: production
          VITE_VERSION: ${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run dev server
        run: npm run dev &
        sleep 10

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render Preview
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.RENDER_REPO }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      
      - name: Trigger Render Deploy
        run: |
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "${{ github.head_ref }}"}'

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      
      - name: Trigger Production Deploy
        run: |
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main", "clearCache": true}'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint-and-type-check]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=high > audit-high.txt || true
          npm audit --audit-level=moderate > audit-moderate.txt || true
          cat audit-high.txt || true

      - name: Check for critical vulnerabilities
        run: |
          echo "=== Checking for critical/high vulnerabilities ==="
          npm audit --json > audit-report.json 2>/dev/null || true
          
          if [ -f audit-report.json ]; then
            CRITICAL=$(cat audit-report.json | jq -r '.metadata.vulnerabilities.critical // 0')
            HIGH=$(cat audit-report.json | jq -r '.metadata.vulnerabilities.high // 0')
            MEDIUM=$(cat audit-report.json | jq -r '.metadata.vulnerabilities.medium // 0')
            LOW=$(cat audit-report.json | jq -r '.metadata.vulnerabilities.low // 0')
            
            echo "Found vulnerabilities:"
            echo "  Critical: $CRITICAL"
            echo "  High: $HIGH"
            echo "  Medium: $MEDIUM"
            echo "  Low: $LOW"
            
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Critical vulnerabilities found! Please fix before merging."
              exit 1
            fi
            
            if [ "$HIGH" -gt 0 ]; then
              echo "::warning::High vulnerabilities found. Consider fixing them."
            fi
          fi

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "=== Checking for hardcoded secrets ==="
          # Check for common patterns
          if grep -r -i "api[_-]key.*=.*['\"][a-zA-Z0-9]\{20,\}['\"]" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "::warning::Possible API key found in code!"
          fi
          if grep -r "secret.*password.*=" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "::warning::Possible password found in code!"
          fi
          echo "Secret scan completed"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: |
            audit-report.json
            audit-high.txt
          retention-days: 7
